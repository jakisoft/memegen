<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luxe Multiplayer | Radiant Realm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- AOS CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&display=swap');
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif;
            background: #ffffff;
        }

        #game-wrapper {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #f8fafc;
        }

        /* Paksa Landscape untuk Mobile */
        @media (orientation: portrait) {
            #game-wrapper {
                width: 100vh !important; height: 100vw !important;
                transform: rotate(90deg); transform-origin: center;
                top: 50% !important; left: 50% !important;
                translate: -50% -50%;
            }
        }

        canvas { display: block; }

        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
        }

        /* Desain Bottom Sheet */
        #user-sheet {
            transform: translateY(100%);
            transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }
        #user-sheet.open { transform: translateY(0); }

        /* Kontrol Joystick */
        #joystick-base {
            position: absolute; bottom: 40px; left: 40px;
            width: 130px; height: 130px; border-radius: 50%;
            background: rgba(0, 0, 0, 0.05);
            border: 2px solid rgba(0, 0, 0, 0.05);
            touch-action: none; display: none;
        }
        #joystick-stick {
            position: absolute; top: 50%; left: 50%;
            width: 50px; height: 50px; border-radius: 50%;
            background: #00E5FF;
            transform: translate(-50%, -50%);
            box-shadow: 0 10px 25px rgba(0, 229, 255, 0.4);
            pointer-events: none;
        }

        .mic-active {
            animation: pulse-mic 1.5s infinite;
        }
        @keyframes pulse-mic {
            0% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.7); }
            100% { box-shadow: 0 0 0 15px rgba(0, 229, 255, 0); }
        }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <!-- HUD: Lokasi -->
        <div class="fixed top-8 left-8 z-50 pointer-events-none">
            <div class="glass p-4 px-6 flex items-center gap-4" data-aos="fade-right">
                <div class="w-3 h-3 rounded-full bg-cyan-400 animate-pulse"></div>
                <div>
                    <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Lokasi Sekarang</p>
                    <h3 id="location-name" class="text-sm font-extrabold text-black uppercase">Area Inisialisasi</h3>
                </div>
            </div>
        </div>

        <!-- HUD: Mic & Pengguna -->
        <div class="fixed top-8 right-8 z-50 flex gap-3 pointer-events-auto">
            <button id="mic-btn" class="glass w-12 h-12 flex items-center justify-center transition-all hover:scale-110">
                <svg id="mic-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
            </button>
            <div class="glass h-12 px-5 flex items-center gap-2">
                <span id="player-count" class="text-xs font-bold">1</span>
                <span class="text-[10px] font-bold uppercase text-gray-400">Online</span>
            </div>
        </div>

        <!-- Joystick -->
        <div id="joystick-base">
            <div id="joystick-stick"></div>
        </div>
    </div>

    <!-- Multiplayer Bottom Sheet (Input User) -->
    <div id="sheet-overlay" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[1000] hidden flex items-end">
        <div id="user-sheet" class="w-full glass rounded-t-[40px] p-10 pb-16 shadow-2xl">
            <div class="w-16 h-1 bg-gray-200 rounded-full mx-auto mb-8"></div>
            <div class="max-w-md mx-auto text-center">
                <h2 class="text-3xl font-black italic tracking-tighter mb-2">SIAPA NAMA ANDA?</h2>
                <p class="text-gray-400 text-sm mb-8 italic">Pemain lain akan melihat nama ini di atas karakter Anda.</p>
                
                <input type="text" id="username-input" placeholder="Masukkan Username..." 
                    class="w-full bg-gray-50 border-2 border-gray-100 p-5 rounded-2xl mb-6 text-center font-bold focus:border-cyan-400 outline-none transition-all uppercase tracking-widest">
                
                <button id="btn-enter" class="w-full bg-black text-white p-5 rounded-2xl font-black tracking-widest hover:scale-[1.02] transition-transform active:scale-95 shadow-xl">
                    MASUK KE DUNIA
                </button>
            </div>
        </div>
    </div>

    <!-- Loader -->
    <div id="loader" class="fixed inset-0 bg-white z-[2000] flex flex-col items-center justify-center">
        <h1 class="text-6xl font-black italic tracking-tighter mb-6">LUXE<span class="text-cyan-400">.</span></h1>
        <div class="w-48 h-1 bg-gray-100 rounded-full overflow-hidden">
            <div id="progress" class="h-full bg-cyan-400 w-0 transition-all duration-300"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Konfigurasi & State ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-id';

        let scene, camera, renderer, clock;
        let yaw = 0, pitch = 0, moveForward = 0, moveRight = 0;
        let joystickActive = false;
        let otherPlayers = {}; 
        let obstacles = []; 
        let micActive = false;
        let myUsername = "Guest";
        let isAuthReady = false;

        // --- THREE.JS ENGINE ---
        function initEngine() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf1f5f9);
            scene.fog = new THREE.Fog(0xf1f5f9, 5, 80);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.7, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.getElementById('game-wrapper').appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // Pencahayaan
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 0.5);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            // Lantai
            const grid = new THREE.GridHelper(200, 100, 0x000000, 0xe2e8f0);
            scene.add(grid);

            // Membuat Halangan
            generateObstacles();
            
            setupControls();
            animate();
        }

        function generateObstacles() {
            const colors = [0x00E5FF, 0x000000, 0xffffff];
            for(let i = 0; i < 25; i++) {
                const h = 4 + Math.random() * 6;
                const geo = new THREE.BoxGeometry(2, h, 2);
                const mat = new THREE.MeshStandardMaterial({ 
                    color: colors[Math.floor(Math.random() * colors.length)],
                    metalness: 0.8, roughness: 0.1 
                });
                const pillar = new THREE.Mesh(geo, mat);
                pillar.position.set((Math.random()-0.5)*80, h/2, (Math.random()-0.5)*80);
                scene.add(pillar);
                
                // Simpan untuk deteksi tabrakan
                obstacles.push({
                    x: pillar.position.x,
                    z: pillar.position.z,
                    radius: 1.5 
                });
            }
        }

        // --- LOGIKA MULTIPLAYER ---
        async function joinGame() {
            // Mandat: Lakukan autentikasi TERLEBIH DAHULU dan tunggu sampai selesai
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth failed:", error);
                return;
            }

            // Tunggu sebentar untuk memastikan auth.currentUser terisi
            const playersCol = collection(db, 'artifacts', appId, 'public', 'data', 'players');
            
            // Listener untuk pemain lain dengan callback error (Mandatori)
            onSnapshot(playersCol, (snapshot) => {
                if (!auth.currentUser) return;
                
                snapshot.docChanges().forEach(change => {
                    const data = change.doc.data();
                    const id = change.doc.id;
                    if (id === auth.currentUser.uid) return;

                    if (change.type === 'added' || change.type === 'modified') {
                        updateOtherPlayer(id, data);
                    } else if (change.type === 'removed') {
                        removeOtherPlayer(id);
                    }
                });
                document.getElementById('player-count').innerText = snapshot.size;
            }, (error) => {
                // Tangani error perizinan jika snapshot gagal
                console.error("Firestore Error:", error);
            });

            // Sinkronisasi data diri sendiri setiap 100ms
            setInterval(() => {
                if (!auth.currentUser) return;
                setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', auth.currentUser.uid), {
                    username: myUsername,
                    x: camera.position.x,
                    z: camera.position.z,
                    yaw: yaw,
                    mic: micActive,
                    lastSeen: Date.now()
                });
            }, 100);
        }

        function updateOtherPlayer(id, data) {
            if (!otherPlayers[id]) {
                const group = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.6, 0.4), new THREE.MeshStandardMaterial({ color: 0x000000 }));
                body.position.y = 0.8;
                group.add(body);

                // Nametag
                const canvas = document.createElement('canvas');
                canvas.width = 256; canvas.height = 64;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.fillRect(0,0,256,64); 
                ctx.font = 'bold 30px Plus Jakarta Sans';
                ctx.fillStyle = '#000'; ctx.textAlign = 'center';
                ctx.fillText(data.username || "Guest", 128, 42);
                
                const texture = new THREE.CanvasTexture(canvas);
                const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture }));
                sprite.position.y = 2.2;
                sprite.scale.set(2, 0.5, 1);
                group.add(sprite);

                scene.add(group);
                otherPlayers[id] = group;
            }
            
            const p = otherPlayers[id];
            p.position.set(data.x, 0, data.z);
            p.rotation.y = data.yaw;
        }

        function removeOtherPlayer(id) {
            if (otherPlayers[id]) {
                scene.remove(otherPlayers[id]);
                delete otherPlayers[id];
            }
        }

        // --- TABRAKAN & HUD ---
        function checkCollision(nextX, nextZ) {
            for (let obs of obstacles) {
                const dist = Math.sqrt((nextX - obs.x)**2 + (nextZ - obs.z)**2);
                if (dist < obs.radius) return true;
            }
            return false;
        }

        function updateLocationHUD() {
            const x = camera.position.x;
            const z = camera.position.z;
            let zone = "Pusat Realm";
            if (x > 20) zone = "Zona Timur";
            else if (x < -20) zone = "Zona Barat";
            else if (z > 20) zone = "Sektor Selatan";
            else if (z < -20) zone = "Sektor Utara";
            
            document.getElementById('location-name').innerText = zone;
        }

        // --- KONTROL ---
        function setupControls() {
            const startBtn = document.getElementById('btn-enter');
            const overlay = document.getElementById('sheet-overlay');
            const input = document.getElementById('username-input');

            startBtn.onclick = () => {
                if (input.value.trim().length < 2) return;
                myUsername = input.value.toUpperCase();
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    document.getElementById('joystick-base').style.display = 'block';
                    joinGame();
                }, 500);
            };

            const micBtn = document.getElementById('mic-btn');
            micBtn.onclick = () => {
                micActive = !micActive;
                micBtn.classList.toggle('mic-active', micActive);
                document.getElementById('mic-icon').classList.toggle('text-cyan-400', micActive);
                document.getElementById('mic-icon').classList.toggle('text-gray-400', !micActive);
            };

            const base = document.getElementById('joystick-base');
            const stick = document.getElementById('joystick-stick');

            const handleJoy = (e) => {
                if(!joystickActive) return;
                const touch = e.touches ? e.touches[0] : e;
                const rect = base.getBoundingClientRect();
                const dx = touch.clientX - (rect.left + rect.width/2);
                const dy = touch.clientY - (rect.top + rect.height/2);
                
                const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 45);
                const angle = Math.atan2(dy, dx);
                
                const tx = Math.cos(angle) * dist;
                const ty = Math.sin(angle) * dist;
                stick.style.transform = `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px))`;
                
                moveRight = tx / 45;
                moveForward = -ty / 45;
            };

            base.addEventListener('touchstart', (e) => { joystickActive = true; handleJoy(e); });
            window.addEventListener('touchmove', (e) => handleJoy(e), {passive: false});
            window.addEventListener('touchend', () => {
                joystickActive = false;
                stick.style.transform = `translate(-50%, -50%)`;
                moveForward = 0; moveRight = 0;
            });

            let lastX, lastY;
            window.addEventListener('touchstart', (e) => {
                if(e.target.id === 'joystick-base') return;
                lastX = e.touches[0].pageX; lastY = e.touches[0].pageY;
            });
            window.addEventListener('touchmove', (e) => {
                if(e.target.id === 'joystick-base') return;
                const dx = e.touches[0].pageX - lastX;
                const dy = e.touches[0].pageY - lastY;
                yaw -= dx * 0.005;
                pitch -= dy * 0.005;
                pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, pitch));
                lastX = e.touches[0].pageX; lastY = e.touches[0].pageY;
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if(!camera) return;

            camera.rotation.order = 'YXZ';
            camera.rotation.y = yaw;
            camera.rotation.x = pitch;

            const speed = 7.0;
            const forwardV = new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);
            const rightV = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), yaw);

            const nextPos = camera.position.clone();
            nextPos.addScaledVector(forwardV, moveForward * speed * delta);
            nextPos.addScaledVector(rightV, moveRight * speed * delta);

            if (!checkCollision(nextPos.x, nextPos.z)) {
                camera.position.copy(nextPos);
            }
            
            camera.position.y = 1.7;
            updateLocationHUD();
            renderer.render(scene, camera);
        }

        window.onload = () => {
            let p = 0;
            const intv = setInterval(() => {
                p += 10;
                document.getElementById('progress').style.width = p + '%';
                if(p >= 100) {
                    clearInterval(intv);
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('sheet-overlay').classList.remove('hidden');
                    setTimeout(() => document.getElementById('user-sheet').classList.add('open'), 100);
                    initEngine();
                }
            }, 100);
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Inisialisasi AOS
        if (typeof AOS !== 'undefined') {
            AOS.init({ duration: 1000, once: true });
        }

        // Pantau status autentikasi
        onAuthStateChanged(auth, (u) => {
            if (u) isAuthReady = true;
        });
    </script>
</body>
</html>
